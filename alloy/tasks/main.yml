---

- name: Install
  community.general.pkgng:
    name: "{{ alloy_package_name }}"
    state: present
  tags:
    - alloy

- name: Create Alloy configuration
  ansible.builtin.template:
    src: alloy.flow
    dest: "{{ alloy_config_file }}"
    mode: "0644"
  notify:
    - Restart alloy
  tags:
    - alloy

- name: Configure Alloy service arguments
  community.general.sysrc:
    name: "{{ alloy_service_name }}_args"
    value: "--disable-reporting"
  tags:
    - alloy

- name: Configure Alloy service user
  community.general.sysrc:
    name: "{{ alloy_service_name }}_user"
    value: "{{ alloy_user }}"
  tags:
    - alloy

- name: Configure Alloy service group
  community.general.sysrc:
    name: "{{ alloy_service_name }}_group"
    value: "{{ alloy_group }}"
  tags:
    - alloy

- name: Enable service
  community.general.sysrc:
    name: "{{ alloy_service_name }}_enable"
    value: "YES"
  tags:
    - alloy

- name: Start service
  ansible.builtin.service:
    name: "{{ alloy_service_name }}"
    state: started
  tags:
    - alloy
